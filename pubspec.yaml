name: subtitle_app
description: AI Subtitle App — ສ້າງ subtitle ໄວ ງ່າຍ
publish_to: 'none'
version: 1.1.5+6

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Video
  video_player: ^2.8.3
  file_picker: ^8.0.0+1
  image_picker: ^1.1.2

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3

  # State
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # Video processing
  saver_gallery: ^3.0.6
  path: ^1.9.0


  # Network
  http: ^1.2.2

  # Utils
  uuid: ^4.4.0
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  google_sign_in: ^7.2.0
  url_launcher: ^6.3.2
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  image: ^4.8.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/
    - assets/fonts/
    - assets/sfx/
    - assets/pay/
